name: Lint

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck
